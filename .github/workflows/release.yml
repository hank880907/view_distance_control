name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Run tests
        run: ./gradlew test

      - name: Build JAR
        run: ./gradlew jar -PpluginVersion=${{ env.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/ViewDistanceControl-${{ env.VERSION }}.jar
          generate_release_notes: true
          body_path: RELEASE_NOTES.md

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: EI18paZi
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          loaders: paper
          game-versions: 1.21.x
          name: ViewDistanceControl ${{ env.VERSION }}
          changelog-file: RELEASE_NOTES.md